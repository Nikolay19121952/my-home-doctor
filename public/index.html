<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1565C0">
    <meta name="description" content="Мой домашний доктор — семейный помощник для здоровья">
    <title>Мой домашний доктор</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Шапка -->
    <header class="app-header">
        <div class="header-content">
            <span class="header-icon">🩺</span>
            <h1 class="header-title">Мой домашний доктор</h1>
        </div>
    </header>

    <!-- Основное содержимое -->
    <main class="app-main">

        <!-- Главная страница -->
        <section id="home" class="page page-active">
            <div class="container">
                <div class="welcome-card">
                    <div class="welcome-icon">🏠</div>
                    <h2>Добро пожаловать!</h2>
                    <p>Это ваш персональный помощник для ведения медицинской карты семьи.</p>
                </div>

                <div class="quick-actions">
                    <h3>Быстрые действия</h3>
                    <button class="action-card" data-navigate="profiles">
                        <span class="action-icon">👨‍👩‍👧‍👦</span>
                        <span class="action-label">Профили семьи</span>
                        <span class="action-desc">Медицинские карты</span>
                    </button>
                    <button class="action-card" data-navigate="diary">
                        <span class="action-icon">📋</span>
                        <span class="action-label">Дневник здоровья</span>
                        <span class="action-desc">Давление, пульс, сахар</span>
                    </button>
                    <button class="action-card" data-navigate="more">
                        <span class="action-icon">📄</span>
                        <span class="action-label">Анализы</span>
                        <span class="action-desc">Результаты обследований</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Список профилей семьи -->
        <section id="profiles" class="page">
            <div class="container">
                <div class="section-header">
                    <h2>Семья</h2>
                    <button id="btn-add-profile" class="btn btn-primary">
                        <span class="btn-icon">+</span> Добавить
                    </button>
                </div>
                <div id="profiles-list"></div>
                <div id="profiles-empty" class="empty-state" style="display: none;">
                    <div class="empty-icon">👨‍👩‍👧‍👦</div>
                    <h3>Пока нет профилей</h3>
                    <p>Добавьте первого члена семьи, чтобы начать вести медицинскую карту.</p>
                    <button class="btn btn-primary btn-large" id="btn-add-profile-empty">
                        <span class="btn-icon">+</span> Добавить члена семьи
                    </button>
                </div>
            </div>
        </section>

        <!-- Форма профиля -->
        <section id="profile-form" class="page">
            <div class="container">
                <div class="section-header">
                    <button id="btn-back-profiles" class="btn btn-outline btn-back">← Назад</button>
                    <h2 id="profile-form-title">Новый профиль</h2>
                </div>
                <form id="form-profile" novalidate>
                    <div class="form-group">
                        <label for="profile-name">ФИО <span class="required">*</span></label>
                        <input type="text" id="profile-name" placeholder="Например: Иванов Пётр Сергеевич" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group form-group-half">
                            <label for="profile-birthdate">Дата рождения</label>
                            <input type="date" id="profile-birthdate">
                        </div>
                        <div class="form-group form-group-half">
                            <label>Пол</label>
                            <div class="toggle-group">
                                <button type="button" class="toggle-btn" data-value="male" id="gender-male">Муж</button>
                                <button type="button" class="toggle-btn" data-value="female" id="gender-female">Жен</button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="profile-blood">Группа крови</label>
                        <select id="profile-blood">
                            <option value="">Не указана</option>
                            <option value="O+">I (O) положительная</option>
                            <option value="O-">I (O) отрицательная</option>
                            <option value="A+">II (A) положительная</option>
                            <option value="A-">II (A) отрицательная</option>
                            <option value="B+">III (B) положительная</option>
                            <option value="B-">III (B) отрицательная</option>
                            <option value="AB+">IV (AB) положительная</option>
                            <option value="AB-">IV (AB) отрицательная</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="profile-chronic">Хронические заболевания</label>
                        <textarea id="profile-chronic" rows="3" placeholder="Например: гипертония, сахарный диабет 2 типа"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="profile-allergies">Аллергии</label>
                        <textarea id="profile-allergies" rows="2" placeholder="Например: пенициллин, аспирин"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="profile-medications">Принимаемые лекарства</label>
                        <textarea id="profile-medications" rows="3" placeholder="Например: Метформин 500мг 2 раза в день"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="profile-surgeries">Перенесённые операции</label>
                        <textarea id="profile-surgeries" rows="2" placeholder="Например: аппендэктомия 1985 г."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="profile-notes">Заметки</label>
                        <textarea id="profile-notes" rows="2" placeholder="Любая дополнительная информация"></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-large btn-full">Сохранить</button>
                        <button type="button" id="btn-cancel-profile" class="btn btn-outline btn-large btn-full">Отмена</button>
                    </div>

                    <div id="delete-profile-section" class="delete-section" style="display: none;">
                        <hr class="divider">
                        <button type="button" id="btn-delete-profile" class="btn btn-danger btn-large btn-full">Удалить профиль</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Просмотр профиля -->
        <section id="profile-view" class="page">
            <div class="container">
                <div class="section-header">
                    <button id="btn-back-from-view" class="btn btn-outline btn-back">← Назад</button>
                    <h2 id="profile-view-title">Профиль</h2>
                </div>
                <div id="profile-view-content"></div>
                <div class="form-actions" style="margin-top: 24px;">
                    <button id="btn-edit-profile" class="btn btn-primary btn-large btn-full">Редактировать</button>
                </div>
            </div>
        </section>

        <!-- Дневник здоровья -->
        <section id="diary" class="page">
            <div class="container">
                <div class="section-header">
                    <h2>Дневник здоровья</h2>
                    <button id="btn-add-entry" class="btn btn-primary">
                        <span class="btn-icon">+</span> Добавить
                    </button>
                </div>

                <div class="form-group" style="margin-bottom: 16px;">
                    <select id="diary-profile" class="diary-profile-select">
                        <option value="">Все члены семьи</option>
                    </select>
                </div>

                <div id="diary-form" style="display: none;" class="card-form">
                    <div class="form-row">
                        <div class="form-group form-group-half">
                            <label for="entry-date">Дата</label>
                            <input type="date" id="entry-date">
                        </div>
                        <div class="form-group form-group-half">
                            <label for="entry-time">Время</label>
                            <input type="time" id="entry-time">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group form-group-half">
                            <label for="entry-systolic">Давление верхнее</label>
                            <input type="number" id="entry-systolic" placeholder="120" min="60" max="300">
                        </div>
                        <div class="form-group form-group-half">
                            <label for="entry-diastolic">Давление нижнее</label>
                            <input type="number" id="entry-diastolic" placeholder="80" min="30" max="200">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group form-group-half">
                            <label for="entry-pulse">Пульс</label>
                            <input type="number" id="entry-pulse" placeholder="72" min="30" max="250">
                        </div>
                        <div class="form-group form-group-half">
                            <label for="entry-sugar">Сахар (ммоль/л)</label>
                            <input type="number" id="entry-sugar" placeholder="5.5" step="0.1" min="1" max="40">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group form-group-half">
                            <label for="entry-temp">Температура</label>
                            <input type="number" id="entry-temp" placeholder="36.6" step="0.1" min="34" max="43">
                        </div>
                        <div class="form-group form-group-half">
                            <label for="entry-weight">Вес (кг)</label>
                            <input type="number" id="entry-weight" placeholder="75" step="0.1" min="20" max="300">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="entry-notes">Заметки</label>
                        <input type="text" id="entry-notes" placeholder="Самочувствие, приём лекарств...">
                    </div>
                    <div class="form-actions" style="flex-direction: row;">
                        <button type="button" id="btn-save-entry" class="btn btn-primary">Сохранить</button>
                        <button type="button" id="btn-cancel-entry" class="btn btn-outline">Отмена</button>
                    </div>
                </div>

                <div id="diary-entries"></div>
            </div>
        </section>

        <!-- Ещё (анализы, напоминания, настройки) -->
        <section id="more" class="page">
            <div class="container">
                <h2 style="margin-bottom: 16px;">Ещё</h2>
                <div class="more-list">
                    <button class="more-item" onclick="More.showSection('analyses')">
                        <span class="more-icon">📄</span>
                        <div class="more-text">
                            <span class="more-label">Анализы и обследования</span>
                            <span class="more-desc">Результаты и заключения</span>
                        </div>
                    </button>
                    <button class="more-item" onclick="More.showSection('reminders')">
                        <span class="more-icon">🔔</span>
                        <div class="more-text">
                            <span class="more-label">Напоминания</span>
                            <span class="more-desc">Приём лекарств и визиты</span>
                        </div>
                    </button>
                    <button class="more-item" onclick="More.showSection('settings')">
                        <span class="more-icon">⚙️</span>
                        <div class="more-text">
                            <span class="more-label">Настройки</span>
                            <span class="more-desc">Экспорт и импорт данных</span>
                        </div>
                    </button>
                </div>
            </div>
        </section>
        <!-- Домашний доктор (чат) -->
        <section id="doctor" class="page">
            <div class="chat-container">
                <div class="chat-header">
                    <h2>Доктор</h2>
                    <button id="btn-clear-chat" class="btn btn-outline btn-small">Очистить</button>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div id="chat-drop-files" class="chat-drop-files" style="display:none"></div>
                <div class="chat-input-area">
                    <label class="btn-attach" title="Прикрепить файл">
                        📎
                        <input type="file" id="chat-file-input" multiple accept=".pdf,.png,.jpg,.jpeg,.gif,.webp" style="display:none">
                    </label>
                    <textarea id="chat-input" class="chat-input" rows="1" placeholder="Напишите, что вас беспокоит..."></textarea>
                    <button id="btn-send-message" class="btn btn-primary btn-send">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Нижняя навигация -->
    <nav class="bottom-nav">
        <button class="nav-btn nav-btn-active" data-target="home">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <span class="nav-label">Главная</span>
        </button>
        <button class="nav-btn" data-target="profiles">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <span class="nav-label">Семья</span>
        </button>
        <button class="nav-btn" data-target="diary">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
            </svg>
            <span class="nav-label">Дневник</span>
        </button>
        <button class="nav-btn" data-target="doctor">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <span class="nav-label">Доктор</span>
        </button>
        <button class="nav-btn" data-target="more">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="1"/>
                <circle cx="19" cy="12" r="1"/>
                <circle cx="5" cy="12" r="1"/>
            </svg>
            <span class="nav-label">Ещё</span>
        </button>
    </nav>

    <!-- Модальное окно -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
        <div class="modal">
            <h3 id="modal-title" class="modal-title"></h3>
            <p id="modal-message" class="modal-message"></p>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn btn-outline">Отмена</button>
                <button id="modal-confirm" class="btn btn-danger">Удалить</button>
            </div>
        </div>
    </div>

    <!-- Тост-уведомление -->
    <div id="toast" class="toast" style="display: none;"></div>

    <script src="js/ui.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/profiles.js"></script>
    <script src="js/doctor.js"></script>
    <script src="js/diary.js"></script>
    <script src="js/more.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
